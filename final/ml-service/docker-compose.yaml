version: "3.9"

services:
  db:
    image: postgres:15
    container_name: mlservice-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5435:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlservice -d mlservice"]
      interval: 5s
      timeout: 5s
      retries: 10

  ml-service:
    build: .
    container_name: ml-service
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
