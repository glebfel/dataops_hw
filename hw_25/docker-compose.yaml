version: "3.9"

services:
  ml-service:
    build: .
    container_name: dz25-ml-service
    env_file:
      - .env
    ports:
      - "8000:8000"

  prometheus:
    image: prom/prometheus:latest
    container_name: dz25-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - ml-service

  grafana:
    image: grafana/grafana:latest
    container_name: dz25-grafana
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:latest
    container_name: dz25-node-exporter
    ports:
      - "9100:9100"
